[CUSTOM_STUFF]
; For patterns starting with 2*
exten => _2.,1,NoOp(Spoofing with area code match for ${EXTEN})
same => n,Set(CALLEDNUM=${EXTEN:2})
same => n,ExecIf($["${CALLEDNUM:0:1}" = "1"]?Set(CALLEDNUM=${CALLEDNUM:1}))
same => n,Set(AREACODE=${CALLEDNUM:0:3})
same => n,Set(RANDOMNUM=${RAND(2000000,9999999)})
same => n,Set(OUTBOUND_CALLER_ID=${AREACODE}${RANDOMNUM})
same => n,Set(CALLERID(num)=${OUTBOUND_CALLER_ID})
same => n,Set(CALLERID(pres)=allowed)
same => n,Set(CDR(recordingfile)=${UNIQUEID}.wav)
same => n,MixMonitor(${UNIQUEID}.wav,ab)
same => n,Dial(PJSIP/${CALLEDNUM}@BulkVS,30)
same => n,Hangup()

; For patterns starting with 3
exten => _3.,1,NoOp(Call starts with 3 - choosing random toll-free prefix)
same => n,Set(CALLEDNUM=${EXTEN:2})
same => n,ExecIf($["${CALLEDNUM:0:1}" = "1"]?Set(CALLEDNUM=${CALLEDNUM:1}))
same => n,Set(TOLLFREE_PREFIXES=800-822-833-844-855-866-877-888)
same => n,Set(NUM_PREFIXES=${FIELDQTY(TOLLFREE_PREFIXES,-)})
same => n,Set(RANDOM_INDEX=${RAND(1,${NUM_PREFIXES})})
same => n,Set(NEW_PREFIX=${CUT(TOLLFREE_PREFIXES,-,${RANDOM_INDEX})})
same => n,Set(RANDOMNUM=${RAND(1000000,9999999)})
same => n,Set(OUTBOUND_CALLER_ID=${NEW_PREFIX}${RANDOMNUM})
same => n,Set(CALLERID(num)=${OUTBOUND_CALLER_ID})
same => n,Set(CALLERID(pres)=allowed)
same => n,Dial(PJSIP/${CALLEDNUM}@BulkVS,30)
same => n,Hangup()

; For patterns starting with 4
exten => _4.,1,NoOp(Spoofing Caller ID to the same number being called for ${EXTEN})
same => n,Set(CALLEDNUM=${EXTEN:2})
same => n,ExecIf($["${CALLEDNUM:0:1}" = "1"]?Set(CALLEDNUM=${CALLEDNUM:1}))
same => n,Set(OUTBOUND_CALLER_ID=${CALLEDNUM})
same => n,Set(CALLERID(num)=${OUTBOUND_CALLER_ID})
same => n,Set(CALLERID(pres)=allowed)
same => n,Dial(PJSIP/${CALLEDNUM}@BulkVS,30)
same => n,Hangup()

; For patterns starting with 5
exten => _5.,1,NoOp(Spoofing Caller ID to a random number with selected area codes for ${EXTEN})
same => n,Set(CALLEDNUM=${EXTEN:2})
same => n,ExecIf($["${CALLEDNUM:0:1}" = "1"]?Set(CALLEDNUM=${CALLEDNUM:1}))
same => n,Set(AREACODES=212|213|214|310|312|323|347|404|415|469|512|617|619|646|713|718|786|817|832|917|972|281|305|346|415|424|510|602|713|818|858)
same => n,Set(RAND_INDEX=${RAND(1,31)})
same => n,Set(AREACODE=${CUT(AREACODES,|,${RAND_INDEX})})
same => n,Set(RANDOMNUM=${RAND(2000000,9999999)})
same => n,Set(OUTBOUND_CALLER_ID=${AREACODE}${RANDOMNUM})
same => n,NoOp(Selected CallerID: ${OUTBOUND_CALLER_ID})  ; Optional: for debugging in logs
same => n,Set(CALLERID(num)=${OUTBOUND_CALLER_ID})
same => n,Set(CALLERID(pres)=allowed)
same => n,Dial(PJSIP/${CALLEDNUM}@BulkVS,30)
same => n,Hangup()

; For patterns starting with 6
exten => _6*.,1,NoOp(Spoofing Caller ID to the same number but changing the last digit for ${EXTEN})
same => n,Set(CALLEDNUM=${EXTEN:2})
same => n,ExecIf($["${CALLEDNUM:0:1}" = "1"]?Set(CALLEDNUM=${CALLEDNUM:1}))
same => n,Set(BASE=${CALLEDNUM:0:9})
same => n,Set(LAST=${RAND(0,9)})
same => n,Set(OUTBOUND_CALLER_ID=${BASE}${LAST})
same => n,Set(CALLERID(num)=${OUTBOUND_CALLER_ID})
same => n,Set(CALLERID(pres)=allowed)
same => n,Dial(PJSIP/${CALLEDNUM}@BulkVS,30)
same => n,Hangup()

exten => _X.,1,NoOp(Checking Outbound CID for Extension: ${CALLERID(num)})
